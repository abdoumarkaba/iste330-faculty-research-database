# Faculty Research Database - Docker Compose
# Authors: Haris Jukovic, Gustavo Mejia, Joann Mathews, Abderrahmane Nait Brahim
# Usage: docker compose up -d

services:
  db:
    image: mysql:8.0
    container_name: faculty-research-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: student
      MYSQL_DATABASE: faculty_research_db
    ports:
      - "3307:3306"
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
